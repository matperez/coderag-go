run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - staticcheck
  disable:
    - deadcode
    - varcheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/matperez/coderag-go

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
